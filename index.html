<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:black;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* HEARTS */
.hearts span{
    position:absolute;
    bottom:-50px;
    font-size:clamp(14px,2vw,24px);
    animation:float 12s linear infinite;
}
@keyframes float{
    0%{transform:translateY(0);opacity:0;}
    10%{opacity:1;}
    100%{transform:translateY(-120vh);opacity:0;}
}

/* START */
#startScreen{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
}

#message{
    font-size:22px;
    text-align:center;
    white-space:pre-line;
}

#cake{
    display:none;
    font-size:70px;
    animation:bounce 1s infinite alternate;
}
@keyframes bounce{
    from{transform:translateY(0);}
    to{transform:translateY(-15px);}
}

#startBtn{
    display:none;
    padding:12px 30px;
    border:none;
    border-radius:10px;
    background:white;
}

/* VIDEO */
#introVideo{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit:contain;
    background:black;
    z-index:999;
}

/* LETTER */
#letterPopup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:0.5s;
    z-index:1000;
}

#letterPopup.show{
    opacity:1;
    pointer-events:auto;
}

.letterBox{
    background:white;
    color:black;
    padding:25px;
    border-radius:15px;
    width:85%;
    max-width:400px;
    text-align:center;
    transform:scale(0.7);
    transition:0.5s;
}

#letterPopup.show .letterBox{
    transform:scale(1);
}

.letterBox button{
    margin-top:15px;
    padding:10px 20px;
}

/* GALLERY */
#gallery{
    display:none;
    width:100vw;
    height:100vh;
    padding:10px;

    column-count:3;
    column-gap:10px;

    overflow-y:auto;
}

.item{
    width:100%;
    margin-bottom:10px;
    break-inside:avoid;
    border-radius:12px;
    border:2px solid white;
    cursor:pointer;
    transition:0.3s;
}

.item:hover{
    transform:scale(1.03);
}

@media(max-width:768px){
    #gallery{column-count:2;}
}
@media(max-width:480px){
    #gallery{column-count:1;}
}

/* VIEWER */
#viewer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

#viewer img,
#viewer video{
    max-width:95%;
    max-height:90%;
}

#closeBtn{
    position:absolute;
    top:20px;
    right:20px;
    font-size:30px;
    cursor:pointer;
    color:white;
}

/* 🔊 MUSIC BUTTON */
#musicBtn{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:2000;

    padding:12px 18px;
    border:none;
    border-radius:30px;

    background:white;
    color:black;
    font-weight:bold;

    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<!-- 🔊 BUTTON -->
<button id="musicBtn">🔊 Play Music</button>

<!-- START -->
<div id="startScreen">
    <div id="message"></div>
    <div id="cake">🎂</div>
    <button id="startBtn">Start ❤️</button>
</div>

<!-- VIDEO -->
<video id="introVideo" muted playsinline>
<source src="intro.mp4">
</video>

<!-- 🎵 MUSIC (FIXED) -->
<audio id="bgMusic" loop playsinline>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- LETTER -->
<div id="letterPopup">
    <div class="letterBox">
        <h2>💖 My Love</h2>
        <p>
            Happy Birthday ❤️<br><br>
            You are my happiness, my peace, my everything.<br>
            I’m so lucky to have you 💖<br><br>
            I love you forever 💫
        </p>
        <button onclick="enterGallery()">Continue ❤️</button>
    </div>
</div>

<!-- GALLERY -->
<div id="gallery"></div>

<!-- VIEWER -->
<div id="viewer">
    <div id="closeBtn">✕</div>
</div>

<script>

/* HEARTS */
for(let i=0;i<30;i++){
    let s=document.createElement("span");
    s.innerHTML="❤️";
    s.style.left=Math.random()*100+"%";
    s.style.animationDuration=(6+Math.random()*6)+"s";
    hearts.appendChild(s);
}

/* TEXT */
const text="Happy Birthday ❤️\nYou mean everything to me 💖";
let i=0;
function type(){
    if(i<text.length){
        message.innerHTML+=text[i++];
        setTimeout(type,50);
    }else{
        cake.style.display="block";
        startBtn.style.display="block";
    }
}
type();

/* 🔊 HARD FIX AUDIO */
const musicBtn = document.getElementById("musicBtn");

// force load
bgMusic.load();

musicBtn.addEventListener("click", function(){

    try{
        bgMusic.muted = false;

        let playPromise = bgMusic.play();

        if(playPromise !== undefined){
            playPromise.then(()=>{

                musicBtn.innerHTML = "🔊 Playing";
                musicBtn.style.opacity = "0.7";

                setTimeout(()=>{
                    musicBtn.style.display="none";
                },2000);

            }).catch(()=>{
                alert("Tap again ❤️");
            });
        }

    }catch(e){
        alert("Audio error ❤️");
    }

});

/* START */
startBtn.onclick=()=>{
    startScreen.style.display="none";
    introVideo.style.display="block";
    introVideo.play();
};

/* VIDEO END */
introVideo.onended=()=>{
    introVideo.style.display="none";
    letterPopup.classList.add("show");
};

/* ENTER */
function enterGallery(){
    letterPopup.classList.remove("show");
    gallery.style.display="block";
    createLayout();
}

/* MASONRY */
function createLayout(){

    gallery.innerHTML="";

    let priorityItems = [
        {type:"img", src:"pic14.jpg"},
        {type:"img", src:"pic15.jpg"},
        {type:"img", src:"pic16.jpg"}
    ];

    let otherItems = [];

    for(let i=1;i<=13;i++){
        otherItems.push({type:"img",src:`pic${i}.jpg`});
    }

    for(let i=1;i<=11;i++){
        otherItems.push({type:"video",src:`vid${i}.mp4`});
    }

    otherItems.sort(()=>Math.random()-0.5);

    let items = [...priorityItems, ...otherItems];

    items.forEach(data=>{
        let el=createItem(data);
        gallery.appendChild(el);
    });
}

function createItem(data){

    let el;

    if(data.type==="img"){
        el=document.createElement("img");
        el.src=data.src;
    }else{
        el=document.createElement("video");
        el.src=data.src;
        el.autoplay=true;
        el.loop=true;
        el.muted=true;
    }

    el.className="item";

    if(data.src.includes("pic14") || data.src.includes("pic15") || data.src.includes("pic16")){
        el.style.border="3px solid gold";
    }

    el.onclick=()=>openViewer(data);

    return el;
}

/* VIEWER */
function openViewer(data){
    viewer.style.display="flex";

    viewer.querySelectorAll("img,video").forEach(el=>el.remove());

    let media;

    if(data.type==="img"){
        media=document.createElement("img");
        media.src=data.src;
    }else{
        media=document.createElement("video");
        media.src=data.src;
        media.controls=true;
        media.autoplay=true;
    }

    viewer.appendChild(media);
}

/* CLOSE */
closeBtn.onclick=()=>{
    viewer.style.display="none";
    viewer.querySelectorAll("video").forEach(v=>v.pause());
};

</script>

</body>
</html>
